---
- name: Встановлення Python pip, venv та acl
  apt:
    name:
      - acl
      - python3-pip
      - python3-venv
    state: present

- name: Створення директорії застосунку
  file:
    path: /opt/myapp
    state: directory
    owner: app
    group: app
    mode: '0755'

- name: Копіювання файлів застосунку
  copy:
    src: "{{ playbook_dir }}/../app/"
    dest: /opt/myapp/
    owner: app
    group: app

- name: Встановлення залежностей у venv
  pip:
    requirements: /opt/myapp/requirements.txt
    virtualenv: /opt/myapp/venv
    virtualenv_command: /usr/bin/python3 -m venv

- name: Виконання міграції бази даних
  command: >
    /opt/myapp/venv/bin/python /opt/myapp/migrate.py
    --db-host {{ hostvars['db-vm']['ansible_host'] }}
    --db-user myappuser
    --db-pass myapppassword
    --db-name mywebapp
  become_user: app
  register: migrate_result
  changed_when: false

- name: Створення systemd сервісу myapp
  template:
    src: myapp.service.j2
    dest: /etc/systemd/system/myapp.service
  notify: restart myapp

- name: Запуск сервісу myapp
  systemd:
    name: myapp
    state: started
    enabled: yes
    daemon_reload: yes